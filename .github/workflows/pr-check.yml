name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install ruff
        working-directory: backend
      - name: Lint
        run: ruff check app/
        working-directory: backend

  lint-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - name: Get packages
        run: flutter pub get
        working-directory: flutter_app
      - name: Analyze
        run: flutter analyze
        working-directory: flutter_app
