name: audioscope
description: 한국어 AI 뉴스 오디오 브리핑 앱

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.0

  # Audio
  just_audio: ^0.9.39

  # Network
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2

  # State Management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # UI
  cached_network_image: ^3.4.1

  # Localization
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
